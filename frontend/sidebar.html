<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChronosPresence</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            min-height: 100vh;
            color: #1a1a2e;
        }

        .sidebar {
            width: 240px;
            min-height: 100vh;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            padding: 28px 18px;
            box-shadow: 2px 0 12px rgba(0, 0, 0, 0.06);
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            flex-shrink: 0;
            z-index: 10;
            border-right: 1px solid #eef0f4;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 35px;
            padding-left: 8px;
        }

        .sidebar-logo .logo-icon {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, #2c3e7a, #4a6fa5);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 16px;
        }

        .sidebar h1 {
            color: #1a1a2e;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .sidebar h1 span {
            color: #2c3e7a;
        }

        .sidebar .menu {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }

        .sidebar .menu-label {
            font-size: 11px;
            text-transform: uppercase;
            color: #9aa0b4;
            letter-spacing: 1px;
            padding: 12px 12px 8px;
            font-weight: 600;
        }

        .sidebar .menu a {
            cursor: pointer;
            padding: 12px 16px;
            border-radius: 12px;
            text-decoration: none;
            color: #5a6072;
            transition: all 0.2s ease;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar .menu a i {
            width: 20px;
            font-size: 16px;
            color: #9aa0b4;
            transition: color 0.2s;
        }

        .sidebar .menu a:hover {
            background: #f0f2f8;
            color: #1a1a2e;
        }

        .sidebar .menu a:hover i {
            color: #2c3e7a;
        }

        .sidebar .menu a.active {
            background: #2c3e7a;
            color: white;
            box-shadow: 0 4px 12px rgba(44, 62, 122, 0.25);
        }

        .sidebar .menu a.active i {
            color: white;
        }

        .sidebar .profil {
            display: flex;
            align-items: center;
            gap: 14px;
            background: #f8f9fc;
            padding: 14px 16px;
            border-radius: 14px;
            margin-top: auto;
            border: 1px solid #eef0f4;
        }

        .sidebar .profil .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2c3e7a, #4a6fa5);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 18px;
        }

        .sidebar .profil .info p {
            font-size: 12px;
            margin: 0;
            color: #9aa0b4;
        }

        .sidebar .profil .info p:first-child {
            font-weight: 600;
            font-size: 13px;
            color: #1a1a2e;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: #f0f2f5;
        }

        .nav_bar {
            height: 72px;
            background: #ffffff;
            border-bottom: 1px solid #eef0f4;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 35px;
            flex-shrink: 0;
        }

        .nav_bar .left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .nav_bar .left h4 {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a2e;
            letter-spacing: -0.3px;
        }

        .nav_bar .left .badge {
            background: #2c3e7a;
            color: white;
            font-size: 10px;
            padding: 2px 12px;
            border-radius: 20px;
            font-weight: 600;
        }

        .nav_bar .right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav_bar .right .date {
            color: #5a6072;
            font-size: 14px;
        }

        .nav_bar .right .status {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #e8f5e9;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            color: #2e7d32;
            font-weight: 500;
        }

        .nav_bar .right .status .dot {
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .frame-container {
            flex: 1;
            background: #f0f2f5;
            overflow: hidden;
            padding: 24px 28px 28px 28px;
        }

        .frame-container iframe {
            width: 100%;
            height: 100%;
            min-height: calc(100vh - 72px - 52px);
            border: none;
            border-radius: 16px;
            background: white;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
            display: block;
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                min-height: auto;
                height: auto;
                flex-direction: row;
                flex-wrap: wrap;
                padding: 14px 18px;
                gap: 8px;
                position: relative;
                border-right: none;
                border-bottom: 1px solid #eef0f4;
            }

            .sidebar-logo {
                margin-bottom: 0;
                padding-left: 0;
                width: auto;
            }

            .sidebar .menu {
                flex-direction: row;
                flex-wrap: wrap;
                gap: 4px;
                width: 100%;
                order: 3;
            }

            .sidebar .menu-label {
                display: none;
            }

            .sidebar .menu a {
                padding: 8px 14px;
                font-size: 13px;
            }

            .sidebar .menu a i {
                font-size: 14px;
            }

            .sidebar .profil {
                margin-top: 0;
                padding: 10px 14px;
                width: auto;
                order: 2;
            }

            .sidebar .profil .info p:first-child {
                font-size: 12px;
            }

            .nav_bar {
                flex-direction: column;
                height: auto;
                padding: 14px 20px;
                gap: 6px;
                text-align: center;
            }

            .nav_bar .right {
                flex-wrap: wrap;
                justify-content: center;
            }

            .frame-container {
                padding: 12px;
            }

            .frame-container iframe {
                min-height: 500px;
                border-radius: 12px;
            }
        }

        @media (max-width: 480px) {
            .sidebar .menu a {
                font-size: 11px;
                padding: 6px 10px;
            }

            .sidebar .menu a i {
                font-size: 12px;
            }

            .nav_bar .left h4 {
                font-size: 16px;
            }

            .sidebar .profil .avatar {
                width: 34px;
                height: 34px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon"><i class="fas fa-clock"></i></div>
            <h1>Chronos<span>Presence</span></h1>
        </div>

        <div class="menu">
            <div class="menu-label">Navigation</div>
            <a href="#" class="active" data-page="dashboard">
                <i class="fas fa-chart-pie"></i> Tableau de bord
            </a>
            <a href="#" data-page="employe">
                <i class="fas fa-users"></i> Employés
            </a>
            <a href="#" data-page="journal">
                <i class="fas fa-book"></i> Journal
            </a>
            <a href="#" data-page="ajouter">
                <i class="fas fa-user-plus"></i> Ajouter
            </a>
        </div>

        <div class="profil">
            <div class="avatar"><i class="fas fa-user"></i></div>
            <div class="info">
                <p>Administrateur</p>
                <p><i class="fas fa-shield-alt" style="font-size:10px;margin-right:4px;"></i> ChronosPresence</p>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="nav_bar">
            <div class="left">
                <h4 id="pageTitle">Tableau de bord</h4>
                <span class="badge">v2.0</span>
            </div>
            <div class="right">
                <span class="date" id="todayDate"><i class="far fa-calendar-alt" style="margin-right:6px;"></i> Chargement...</span>
                <span class="status">
                    <span class="dot"></span>
                    <i class="fas fa-wifi"></i> Connecté
                </span>
            </div>
        </div>

        <div class="frame-container">
            <iframe id="contentFrame" src="dashboard.html"></iframe>
        </div>
    </div>

    <script>
        // ===== DATE =====
        function updateDate() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('todayDate').innerHTML = 
                '<i class="far fa-calendar-alt" style="margin-right:6px;"></i> ' + now.toLocaleDateString('fr-FR', options);
        }
        updateDate();

        // ===== NAVIGATION =====
        const menuLinks = document.querySelectorAll('.menu a');
        const frame = document.getElementById('contentFrame');
        const pageTitle = document.getElementById('pageTitle');

        const pageTitles = {
            'dashboard': 'Tableau de bord',
            'employe': 'Liste du Personnel',
            'journal': 'Journal de Présence',
            'ajouter': 'Ajouter un Employé'
        };

        const pageFiles = {
            'dashboard': 'dashboard.html',
            'employe': 'Employe.html',
            'journal': 'Journal.html',
            'ajouter': 'ajouter.html'
        };

        function navigate(page) {
            menuLinks.forEach(link => {
                link.classList.remove('active');
                if (link.dataset.page === page) {
                    link.classList.add('active');
                }
            });

            if (pageTitles[page]) {
                pageTitle.textContent = pageTitles[page];
            }

            if (pageFiles[page]) {
                frame.src = pageFiles[page];
            }
        }

        menuLinks.forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                navigate(this.dataset.page);
            });
        });

        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'navigate') {
                navigate(event.data.page);
            }
        });

        // ===== CHARGEMENT INITIAL =====
        navigate('dashboard');

        // Mettre à jour la date toutes les minutes
        setInterval(updateDate, 60000);
    </script>
</body>
</html>
