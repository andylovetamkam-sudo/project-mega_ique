<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ChronosPresence</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f0f2f5;
            padding: 20px;
            color: #1a1a2e;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 22px 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid #eef0f4;
            transition: transform 0.2s;
        }
        .stat-card:hover { transform: translateY(-2px); }

        .stat-card .icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 12px;
        }
        .stat-card .icon.blue { background: #e8edf9; color: #2c3e7a; }
        .stat-card .icon.green { background: #e8f5e9; color: #2e7d32; }
        .stat-card .icon.orange { background: #fff3e0; color: #e65100; }
        .stat-card .icon.red { background: #fce4ec; color: #c62828; }

        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a2e;
        }
        .stat-card .label {
            font-size: 13px;
            color: #9aa0b4;
            font-weight: 500;
        }
        .stat-card .sub {
            font-size: 13px;
            color: #5a6072;
            margin-top: 4px;
        }
        .stat-card .sub .up { color: #2e7d32; }
        .stat-card .sub .down { color: #c62828; }

        .activity-section {
            background: white;
            border-radius: 16px;
            border: 1px solid #eef0f4;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .activity-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid #eef0f4;
            flex-wrap: wrap;
            gap: 12px;
        }

        .activity-header h2 {
            font-size: 17px;
            font-weight: 700;
            color: #1a1a2e;
        }
        .activity-header h2 i { color: #2c3e7a; margin-right: 8px; }

        .activity-header .actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .activity-header .actions button {
            padding: 8px 18px;
            border-radius: 10px;
            border: 1px solid #eef0f4;
            background: white;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            color: #5a6072;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .activity-header .actions button:hover {
            background: #f0f2f8;
            border-color: #d0d4e0;
        }

        .activity-header .actions .primary-btn {
            background: #2c3e7a;
            color: white;
            border: none;
        }
        .activity-header .actions .primary-btn:hover { background: #1a2a5e; }

        .activity-table { overflow-x: auto; }
        .activity-table table { width: 100%; border-collapse: collapse; }

        .activity-table th {
            text-align: left;
            padding: 14px 20px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #9aa0b4;
            font-weight: 600;
            background: #f8f9fc;
            border-bottom: 1px solid #eef0f4;
        }
        .activity-table th i { margin-right: 6px; }

        .activity-table td {
            padding: 14px 20px;
            border-bottom: 1px solid #f0f2f5;
            font-size: 14px;
            vertical-align: middle;
        }
        .activity-table tr:last-child td { border-bottom: none; }
        .activity-table tr:hover td { background: #fafbfd; }

        .employee-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .employee-cell .avatar-sm {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2c3e7a, #4a6fa5);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 14px;
            flex-shrink: 0;
        }

        .employee-cell .info .name {
            font-weight: 600;
            color: #1a1a2e;
        }
        .employee-cell .info .role {
            font-size: 12px;
            color: #9aa0b4;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-badge i { margin-right: 4px; }

        .status-badge.on-time { background: #e8f5e9; color: #2e7d32; }
        .status-badge.late { background: #fff3e0; color: #e65100; }
        .status-badge.depart { background: #e3f2fd; color: #0d47a1; }
        .status-badge.absent { background: #fce4ec; color: #c62828; }

        .time-display { font-weight: 500; color: #1a1a2e; }

        .footer-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: #f8f9fc;
            border-top: 1px solid #eef0f4;
            font-size: 13px;
            color: #9aa0b4;
            flex-wrap: wrap;
            gap: 8px;
        }

        .refresh-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #9aa0b4;
        }
        .refresh-indicator .fa-spin { color: #2c3e7a; }

        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #c62828;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            animation: pulse-badge 1.5s infinite;
        }
        .live-badge .dot {
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            animation: pulse-dot 1s infinite;
        }

        @keyframes pulse-badge {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.7); }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #9aa0b4;
        }
        .empty-state i {
            font-size: 48px;
            display: block;
            margin-bottom: 16px;
            color: #d0d4e0;
        }

        .fingerprint-icon {
            color: #8B5CF6;
        }

        @media (max-width: 1024px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 640px) {
            .stats-grid { grid-template-columns: 1fr; }
            .activity-header { flex-direction: column; align-items: stretch; }
            .activity-header .actions { flex-wrap: wrap; }
            .activity-header .actions button { flex: 1; text-align: center; justify-content: center; }
            .footer-info { flex-direction: column; text-align: center; }
            .activity-table td, .activity-table th { padding: 10px 14px; font-size: 13px; }
            .employee-cell .avatar-sm { width: 30px; height: 30px; font-size: 11px; }
        }
    </style>
</head>
<body>

    <!-- ===== STATS ===== -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="icon blue"><i class="fas fa-users"></i></div>
            <div class="value" id="totalEmployees">0</div>
            <div class="label">Total Employés</div>
            <div class="sub"><i class="fas fa-users"></i> Actifs</div>
        </div>

        <div class="stat-card">
            <div class="icon green"><i class="fas fa-user-check"></i></div>
            <div class="value" id="presentToday">0</div>
            <div class="label">Présents Aujourd'hui</div>
            <div class="sub"><i class="fas fa-check-circle"></i> Pointages</div>
        </div>

        <div class="stat-card">
            <div class="icon orange"><i class="fas fa-clock"></i></div>
            <div class="value" id="lateToday">0</div>
            <div class="label">En Retard</div>
            <div class="sub"><i class="fas fa-exclamation-triangle"></i> À surveiller</div>
        </div>

        <div class="stat-card">
            <div class="icon red"><i class="fas fa-user-slash"></i></div>
            <div class="value" id="absentToday">0</div>
            <div class="label">Absents</div>
            <div class="sub"><i class="fas fa-calendar-day"></i> Aujourd'hui</div>
        </div>
    </div>

    <!-- ===== ACTIVITIES ===== -->
    <div class="activity-section">
        <div class="activity-header">
            <h2>
                <i class="fas fa-fingerprint fingerprint-icon"></i> Logs Empreintes (ESP32)
                <span class="live-badge">
                    <span class="dot"></span> LIVE
                </span>
            </h2>
            <div class="actions">
                <button onclick="refreshData()" title="Actualiser">
                    <i class="fas fa-sync-alt" id="refreshIcon"></i> Actualiser
                </button>
                <button class="primary-btn" onclick="parent.postMessage({type:'navigate',page:'journal'},'*')">
                    <i class="fas fa-eye"></i> Voir tout →
                </button>
            </div>
        </div>

        <div class="activity-table">
            <table>
                <thead>
                    <tr>
                        <th><i class="fas fa-user"></i> Nom</th>
                        <th><i class="fas fa-fingerprint"></i> ID Empreinte</th>
                        <th><i class="fas fa-clock"></i> Horodatage</th>
                        <th><i class="fas fa-circle"></i> Statut</th>
                    </tr>
                </thead>
                <tbody id="activitiesBody">
                    <tr>
                        <td colspan="4">
                            <div class="empty-state">
                                <i class="fas fa-spinner fa-spin"></i>
                                <p>Chargement des données...</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="footer-info">
            <span id="activitiesCount">0 logs</span>
            <div class="refresh-indicator">
                <i class="fas fa-sync-alt fa-spin"></i>
                <span id="lastRefresh">Mise à jour automatique</span>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let refreshInterval;

        // ===== CHARGEMENT DES STATISTIQUES =====
        async function loadDashboardStats() {
            try {
                const response = await fetch(`${API_BASE}/api/dashboard/stats`);
                const result = await response.json();

                if (result.success) {
                    const data = result.data;
                    document.getElementById('totalEmployees').textContent = data.total_employees || 0;
                    document.getElementById('presentToday').textContent = data.present_today || 0;
                    document.getElementById('lateToday').textContent = data.late_today || 0;
                    document.getElementById('absentToday').textContent = data.absent_today || 0;
                }
            } catch (error) {
                console.error('❌ Erreur stats:', error);
            }
        }

        // ===== CHARGEMENT DES LOGS FINGERPRINT =====
        async function loadFingerprintLogs() {
            try {
                const response = await fetch(`${API_BASE}/api/fingerprint/logs?limit=20`);
                const result = await response.json();

                const tbody = document.getElementById('activitiesBody');

                if (result.success && result.data && result.data.length > 0) {
                    tbody.innerHTML = result.data.map(log => {
                        const time = new Date(log.timestamp);
                        const timeStr = time.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                        const dateStr = time.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric' });

                        const statusColor = log.status === 'granted' ? '#2e7d32' : '#c62828';
                        const statusIcon = log.status === 'granted' ? 'fa-check-circle' : 'fa-times-circle';

                        return `
                            <tr>
                                <td>
                                    <div class="employee-cell">
                                        <div class="avatar-sm" style="background: linear-gradient(135deg, #8B5CF6, #6D28D9);">
                                            <i class="fas fa-fingerprint"></i>
                                        </div>
                                        <div class="info">
                                            <div class="name">${log.name || 'Inconnu'}</div>
                                            <div class="role"><i class="fas fa-id-card"></i> ID: ${log.fingerprint_id}</div>
                                        </div>
                                    </div>
                                </td>
                                <td><span style="font-family: monospace; font-weight: 600;">${log.fingerprint_id}</span></td>
                                <td>
                                    <span class="time-display"><i class="far fa-clock"></i> ${timeStr}</span>
                                    <div style="font-size:11px; color:#9aa0b4;">${dateStr}</div>
                                </td>
                                <td>
                                    <span class="status-badge" style="background: ${statusColor}20; color: ${statusColor};">
                                        <i class="fas ${statusIcon}"></i> ${log.status || 'N/A'}
                                    </span>
                                    <div style="font-size:11px; color:#9aa0b4; margin-top:4px;">
                                        <i class="fas fa-cog"></i> ${log.method || 'fingerprint'}
                                    </div>
                                </td>
                            </tr>
                        `;
                    }).join('');

                    document.getElementById('activitiesCount').textContent =
                        `Affichage de ${result.data.length} log${result.data.length > 1 ? 's' : ''} (total: ${result.total || 0})`;
                } else {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="4">
                                <div class="empty-state">
                                    <i class="fas fa-fingerprint" style="color: #8B5CF6;"></i>
                                    <p>Aucun log d'empreinte pour le moment.</p>
                                    <p style="font-size:12px; margin-top:8px;">Les données de l'ESP32 apparaîtront ici en temps réel.</p>
                                </div>
                            </td>
                        </tr>
                    `;
                    document.getElementById('activitiesCount').textContent = '0 log';
                }

                // Mettre à jour l'heure du dernier rafraîchissement
                const now = new Date();
                document.getElementById('lastRefresh').textContent =
                    `Dernière mise à jour : ${now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`;

            } catch (error) {
                console.error('❌ Erreur chargement logs fingerprint:', error);
                document.getElementById('activitiesBody').innerHTML = `
                    <tr>
                        <td colspan="4">
                            <div class="empty-state" style="color:#c62828;">
                                <i class="fas fa-exclamation-circle"></i>
                                <p>Erreur de connexion au serveur.</p>
                                <p style="font-size:12px; margin-top:8px;">Vérifiez que l'API est accessible sur ${API_BASE}</p>
                            </div>
                        </td>
                    </tr>
                `;
            }
        }

        // ===== RAFRAÎCHISSEMENT MANUEL =====
        async function refreshData() {
            const icon = document.getElementById('refreshIcon');
            icon.classList.add('fa-spin');

            await Promise.all([
                loadDashboardStats(),
                loadFingerprintLogs()
            ]);

            setTimeout(() => icon.classList.remove('fa-spin'), 500);
        }

        // ===== INITIALISATION =====
        async function init() {
            await refreshData();

            // Rafraîchissement automatique toutes les 5 secondes
            refreshInterval = setInterval(() => {
                loadDashboardStats();
                loadFingerprintLogs();
            }, 5000);

            console.log('✅ Dashboard initialisé - Mise à jour toutes les 5 secondes');
            console.log('📡 En attente des données ESP32 sur /api/fingerprint/logs');
        }

        // ===== NETTOYAGE =====
        window.addEventListener('beforeunload', () => {
            if (refreshInterval) clearInterval(refreshInterval);
        });

        // Démarrer
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
