services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chronos-api
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
      - PORT=8000
      - JWT_SECRET=chronos-secret-key-2024
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped
    networks:
      - chronos-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chronos-frontend
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - chronos-network

networks:
  chronos-network:
    driver: bridge