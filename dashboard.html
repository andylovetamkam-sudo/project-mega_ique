        body {
                    margin: 0;
                    display: flex;
                    min-height: 100vh;

                }

                th {

                }

                }

                a {

                    padding: 20px;
                    border-radius: 20px;
                    background-color: rgb(247, 245, 248);

                }

                .menu {

                    gap: 10px;
                }

                a:hover {

                }

                    display: flex;
                    background-color: #eee1e1;
                    padding: 3px;
                    border-radius: 10px;

                }

                    background: #d682b3;
                }

                .name {

                }

                    height: 80px;
                    background: white;
                    border-bottom: 1px solid #968b8b;
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                    padding: 0 30px;
                }

                h1 {
                    padding-left: 12px;
                }

                .main {
                    flex: 1;
                    display: flex;
                    flex-direction: column;
                    padding: 20px;
                    width: 100%;
                }

                .principe {
                    background-color: rgb(221, 217, 213);
                    min-height: 100vh;
                    width: 100%;
                    display: flex;
                    flex-direction: column;
                    gap: 10px;
                }

                    background-color: rgb(255, 255, 255);
                    padding: 50px;
                    border-radius: 20px;
                    height: 20px;
                    margin-left: 55px;
                    justify-items: center;
                    align-items: center;
                }

                .tableau {
                    background-color: rgb(252, 249, 245);
                    border-radius: 10px;
                    padding: 30px;
                    margin: 50px;
                    height: 380px;




                }

                .box {
                    padding: 10px;
                    display: flex;
                    gap: 10px;
                    font-size: 11px;
                }

                .btn {
                    margin-left: 50px;
                }

                tr:hover {
                    background-color: aquamarine;
                }

                #span {
                    background-color: #968b8b;
                }

                #all_view {
                    background-color: rgb(17, 17, 75);
                    border-radius: 15px;
                    padding: 8px;
                    cursor: pointer;
                    color: white;
                    border: none;
                }

                #exporter {
                    background-color: #b3b2b2;
                    border-radius: 15px;
                    padding: 8px;
                    cursor: pointer;
                    border: none;
                }

                span {

                    padding: 10px;
                    border-radius: 15px;
                }

                    height: 55px;
                    object-fit: cover;
                    border-radius: 50%;
                    cursor: pointer;

                .employe {

                    align-items: center;

                }

                .table-header {
