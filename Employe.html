<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChronosPresence</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, Helvetica, sans-serif;
            background:#f5f5f5;
            display: flex;
            color: #333;
            padding: 20px;
            min-height: 100vh;
        }
        .navbar{
            background-color: #d3d2d2;
            width: 100%;
            height: 100px;   
            display: flex;
            justify-content: space-between;
            align-items: center;   
            color: #333;    
            padding: 0 30px;
            border-radius: 10px;
        }
        input{
            border-radius: 20px;
            border: solid 1px #ccc;
            padding: 10px 20px;
            cursor:pointer;
            font-size: 14px;
        }
        .main{
            flex: 1;
            padding: 20px;
            width: 100%;
        }
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            .navbar {
                flex-direction: column;
                height: auto;
                padding: 20px;
                gap: 10px;
            }
            input {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="main">
        <div class="navbar">
            <h2>LISTE DU PERSONEL</h2>
            <input type="text" placeholder="RECHERCHER">
        </div>
    </div>
</body>
</html>
