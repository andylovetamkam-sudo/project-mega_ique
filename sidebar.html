<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChronosPresence</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f5f5;
            display: flex;
            min-height: 100vh;
            color: #333;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            min-height: 100vh;
            background: white;
            display: flex;
            flex-direction: column;
            padding: 25px 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            flex-shrink: 0;
            z-index: 10;
        }

        .sidebar h1 {
            color: #2c3e7a;
            font-size: 20px;
            margin-bottom: 30px;
            text-align: center;
        }

        .sidebar .menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .sidebar .menu a {
            cursor: pointer;
            padding: 12px 16px;
            border-radius: 20px;
            background-color: #f5f5f8;
            text-decoration: none;
            color: #333;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
        }

        .sidebar .menu a:hover {
            background-color: orange;
            transform: translateX(5px);
        }

        .sidebar .menu a.active {
            background-color: #2c3e7a;
            color: white;
        }

        .profil {
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: #eee1e1;
            padding: 10px;
            border-radius: 10px;
            margin-top: auto;
        }

        .profil .toff {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #d682b3;
            flex-shrink: 0;
        }

        .profil .name p {
            font-size: 12px;
            margin: 0;
        }

        .profil .name p:first-child {
            font-weight: bold;
            font-size: 13px;
        }

        /* Contenu principal */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Barre de navigation */
        .nav_bar {
            height: 80px;
            background: white;
            border-bottom: 1px solid #968b8b;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            flex-shrink: 0;
        }

        .nav_bar h4 {
            font-size: 18px;
            color: #333;
        }

        .nav_bar p {
            color: #777;
            font-size: 14px;
        }

        /* Frame */
        .frame-container {
            flex: 1;
            background: #f0efef;
            overflow: hidden;
        }

        .frame-container iframe {
            width: 100%;
            height: 100%;
            min-height: calc(100vh - 80px);
            border: none;
            display: block;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                min-height: auto;
                height: auto;
                flex-direction: row;
                flex-wrap: wrap;
                padding: 15px;
                gap: 10px;
                position: relative;
            }

            .sidebar h1 {
                width: 100%;
                margin-bottom: 10px;
                font-size: 18px;
            }

            .sidebar .menu {
                flex-direction: row;
                flex-wrap: wrap;
                gap: 5px;
                width: 100%;
            }

            .sidebar .menu a {
                padding: 8px 14px;
                font-size: 13px;
            }

            .profil {
                margin-top: 0;
                width: 100%;
            }

            .frame-container iframe {
                min-height: 500px;
            }

            .nav_bar {
                flex-direction: column;
                height: auto;
                padding: 15px;
                gap: 5px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- SIDEBAR -->
    <div class="sidebar">
        <h1>chronosPresence</h1>
        <div class="menu">
            <a href="#" class="active" data-page="dashboard">dashboard</a>
            <a href="#" data-page="employe">employes</a>
            <a href="#" data-page="journal">journal</a>
            <a href="#" data-page="ajouter">ajouter</a>
        </div>
        <div class="profil">
            <div class="toff"></div>
            <div class="name">
                <p>ANDY TAMKAM</p>
                <p>administracteur</p>
            </div>
        </div>
    </div>

    <!-- CONTENU PRINCIPAL -->
    <div class="main-content">
        <div class="nav_bar">
            <h4 id="pageTitle">TABLEAU DE bord</h4>
            <p id="todayDate">date du jour</p>
        </div>
        <div class="frame-container">
            <iframe id="contentFrame" src="dashboard.html"></iframe>
        </div>
    </div>

    <script>
        // Date du jour
        function updateDate() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('todayDate').textContent = now.toLocaleDateString('fr-FR', options);
        }
        updateDate();

        // Navigation
        const menuLinks = document.querySelectorAll('.menu a');
        const frame = document.getElementById('contentFrame');
        const pageTitle = document.getElementById('pageTitle');

        const pageTitles = {
            'dashboard': 'TABLEAU DE bord',
            'employe': 'LISTE DU PERSONEL',
            'journal': 'JOURNAL DE PRÉSENCE',
            'ajouter': 'AJOUTER UN EMPLOYÉ'
        };

        const pageFiles = {
            'dashboard': 'dashboard.html',
            'employe': 'Employe.html',
            'journal': 'journal.html',
            'ajouter': 'ajouter.html'
        };

        function navigate(page) {
            // Mettre à jour le lien actif
            menuLinks.forEach(link => {
                link.classList.remove('active');
                if (link.dataset.page === page) {
                    link.classList.add('active');
                }
            });

            // Mettre à jour le titre
            if (pageTitles[page]) {
                pageTitle.textContent = pageTitles[page];
            }

            // Charger la page
            if (pageFiles[page]) {
                frame.src = pageFiles[page];
            }
        }

        // Écouter les clics
        menuLinks.forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                const page = this.dataset.page;
                navigate(page);
            });
        });

        // Communication depuis les iframes
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'navigate') {
                navigate(event.data.page);
            }
        });

        // Page par défaut
        navigate('dashboard');
    </script>
</body>
</html>
